<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../shared.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="doctor-dashboard.css">
    <title>MediSync - Doctor Dashboard</title>
    <script src="../sync.js"></script>
</head>
<body>
    <div class="dashboard">
        <!-- Left Navbar -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <img src="../login/Logo_Medisync.png" alt="MediSync Logo" class="logo">
            </div>

            <ul class="sidebar-menu">
                <li class="active ripple tooltip nav-item" data-tooltip="Dashboard Overview" data-page="dashboard">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </li>
                <li class="ripple tooltip nav-item" data-tooltip="Set Availability" data-page="availability">
                    <i class="fas fa-calendar-alt"></i>
                    <span>Availability</span>
                </li>
                <li class="ripple tooltip nav-item" data-tooltip="Appointment History" data-page="history">
                    <i class="fas fa-history"></i>
                    <span>History</span>
                </li>
                <li class="ripple tooltip nav-item" data-tooltip="Account Settings" data-page="settings">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </li>
            </ul>

            <!-- Doctor Profile Section -->
            <div class="patient-profile">
                <div class="avatar-img">
                    <span></span>
                </div>
                <div class="patient-info">
                    <h4></h4>
                    <p>Doctor Portal</p>
                </div>
            </div>

            <div class="sidebar-footer">
                <div class="theme-toggle">
                    <input type="checkbox" id="theme-switch">
                    <label for="theme-switch" class="theme-toggle-btn">
                        <i class="fas fa-moon"></i>
                        <i class="fas fa-sun"></i>
                        <span class="ball"></span>
                    </label>
                </div>
                <button class="logout-btn ripple tooltip" data-tooltip="Sign Out">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <h1>Doctor Dashboard</h1>
                <div class="header-actions">
                    <div class="notifications">
                        <i class="fas fa-bell"></i>
                        <div class="notification-badge" style="display: none;">0</div>
                        <div class="notifications-dropdown" id="notifications-dropdown" style="display: none;">
                            <div class="notifications-header">
                                <h4>Notifications</h4>
                                <button class="mark-all-read" id="mark-all-read">Mark all as read</button>
                            </div>
                            <div class="notifications-list" id="notifications-list"></div>
                            <div class="notifications-footer">
                                <button class="view-all" id="view-all-notifications">View all notifications</button>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <div class="dashboard-content">
                <!-- Welcome Section -->
                <section class="welcome-card">
                    <h2>Welcome to MediSync</h2>
                    <p>Manage your patients and appointments effectively.</p>
                </section>

                <!-- Quick Stats -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(45, 160, 168, 0.1); color: var(--accent-color);">
                            <i class="fas fa-calendar-check"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="stat-today-appointments">0</h3>
                            <p>Today's Appointments</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(255, 193, 7, 0.1); color: #ffc107;">
                            <i class="fas fa-clock"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="stat-pending-requests">0</h3>
                            <p>Pending Requests</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(40, 167, 69, 0.1); color: #28a745;">
                            <i class="fas fa-user-friends"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="stat-total-patients">0</h3>
                            <p>Total Patients</p>
                        </div>
                    </div>
                </div>

                <div class="main-grid">
                    <!-- Appointments List -->
                    <section class="appointments-section">
                        <div class="section-header">
                            <h2>Today's Schedule</h2>
                        </div>
                        <div id="todays-appointments-list" class="appointments-list">
                            <!-- Appointments will be injected here -->
                        </div>
                    </section>

                    <!-- Recent Activity -->
                    <section class="activity-section">
                        <div class="section-header">
                            <h2>Recent Activity</h2>
                        </div>
                        <div id="recent-activity-list" class="activity-list">
                            <!-- Activity will be injected here -->
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <script src="doctor-dashboard.js"></script>
    <script src="../notifications.js"></script>
    <script src="history.js"></script>
</body>
</html>
