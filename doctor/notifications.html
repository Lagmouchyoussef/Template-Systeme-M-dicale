<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css.all.min.css">
    <link rel="stylesheet" href="doctor-dashboard.css">
    <link rel="stylesheet" href="history.css">
    <title>MediSync - All Notifications</title>
</head>
<body>
    <div class="dashboard">
        <!-- Left Navbar -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <img src="../login/Logo_Medisync.png" alt="MediSync Logo" class="logo">
            </div>

            <ul class="sidebar-menu">
                <li class="ripple tooltip nav-item" data-tooltip="Dashboard Overview" data-page="dashboard">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </li>
                <li class="ripple tooltip nav-item" data-tooltip="Set Availability" data-page="availability">
                    <i class="fas fa-calendar-alt"></i>
                    <span>Availability</span>
                </li>
                <li class="ripple tooltip nav-item" data-tooltip="Consultation History" data-page="history">
                    <i class="fas fa-history"></i>
                    <span>History</span>
                </li>
                <li class="ripple tooltip nav-item" data-tooltip="Account Settings" data-page="settings">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </li>
            </ul>

            <!-- Doctor Profile Section -->
            <div class="patient-profile">
                <div class="avatar-img">
                    <span></span>
                </div>
                <div class="patient-info">
                    <h4></h4>
                    <p>Doctor</p>
                </div>
            </div>

            <div class="sidebar-footer">
                <div class="theme-toggle">
                    <input type="checkbox" id="theme-switch">
                    <label for="theme-switch" class="theme-toggle-btn">
                        <i class="fas fa-moon"></i>
                        <i class="fas fa-sun"></i>
                        <span class="ball"></span>
                    </label>
                </div>
                <button class="logout-btn ripple tooltip" data-tooltip="Sign Out">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
             <header class="header">
                 <div>
                     <h1>All Notifications</h1>
                 </div>
                 <div class="header-actions">
                     <button class="btn-secondary" id="mark-all-read-page">Mark all as read</button>
                     <button class="btn-secondary" id="back-btn">Close</button>
                 </div>
             </header>

            <div class="notifications-content">
                <div class="notifications-list" id="full-notifications-list">
                    <!-- Notifications will be loaded here -->
                </div>
            </div>
        </main>
    </div>

    <script src="doctor-dashboard.js"></script>
    <script src="notifications.js"></script>
</body>
</html></content>
