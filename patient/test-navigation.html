<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Patient Navigation</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        nav { background: #f0f0f0; padding: 10px; margin-bottom: 20px; }
        .nav-item { display: inline-block; margin: 0 10px; padding: 10px; cursor: pointer; background: #ddd; }
        .nav-item.active { background: #007bff; color: white; }
    </style>
</head>
<body>
    <h1>Test Patient Navigation</h1>

    <nav class="sidebar">
        <ul class="sidebar-menu">
            <li class="active ripple tooltip nav-item" data-page="dashboard">
                <span>Dashboard</span>
            </li>
            <li class="ripple tooltip nav-item" data-page="appointments">
                <span>Appointments</span>
            </li>
            <li class="ripple tooltip nav-item" data-page="history">
                <span>History</span>
            </li>
            <li class="ripple tooltip nav-item" data-page="settings">
                <span>Settings</span>
            </li>
        </ul>
    </nav>

    <div id="output"></div>

    <script>
        function log(message) {
            const output = document.getElementById('output');
            const p = document.createElement('p');
            p.textContent = new Date().toLocaleTimeString() + ': ' + message;
            output.appendChild(p);
            showStyledMessage(message, 'debug');
        }

        function setupNavigation() {
            log('Setting up navigation...');
            const sidebarNavItems = document.querySelectorAll('.sidebar-menu .nav-item');

            log('Found ' + sidebarNavItems.length + ' nav items');

            sidebarNavItems.forEach(item => {
                item.addEventListener('click', function() {
                    const page = this.dataset.page;
                    log('Clicked on page: ' + page);

                    // Update active state
                    document.querySelectorAll('.sidebar-menu .nav-item').forEach(nav => nav.classList.remove('active'));
                    this.classList.add('active');

                    // Navigate to page
                    switch(page) {
                        case 'dashboard':
                            log('Would navigate to patient.html');
                            // window.location.href = './patient.html';
                            break;
                        case 'appointments':
                            log('Would navigate to appointments.html');
                            // window.location.href = './appointments.html';
                            break;
                        case 'history':
                            log('Would navigate to history.html');
                            // window.location.href = './history.html';
                            break;
                        case 'settings':
                            log('Would navigate to settings.html');
                            // window.location.href = './settings.html';
                            break;
                    }
                });
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            log('DOMContentLoaded fired');
            setupNavigation();
        });
    </script>
</body>
</html>
